# docker-compose.second.yml — 第二个 ClawSynapse 实例
# 与 docker-compose.yml 平行运行，刻意错开端口与数据卷，避免冲突：
#   - 容器名:      clawsynapse2
#   - 宿主机端口:  18081 -> 容器内 18080
#   - 数据卷:      clawsynapse2-data / hermes2-data（互不复用，身份独立）
#   - 镜像/环境变量: 复用主 .env（agnes 自定义 provider 自动注入）
#
# 启动:  docker compose -p clawsynapse2 -f docker-compose.second.yml up -d
# 停止:  docker compose -p clawsynapse2 -f docker-compose.second.yml down
#   ⚠ 必须带 -p clawsynapse2 指定独立项目名，否则会与第一个实例(项目 clawsynapse)
#     冲突，compose 会误把第一个容器 recreate/删除。

services:
  clawsynapse:
    image: ${CLAWSYNAPSE_IMAGE:-clawsynapse:latest}
    container_name: clawsynapse2
    hostname: clawsynapse2
    restart: unless-stopped

    # ── Ports（宿主机 18081，避开第一个实例的 18080）──
    ports:
      - "18081:18080"

    # ── Environment variables（与第一个实例相同的透传，agnes provider 自动注入）──
    environment:
      - CLAWSYNAPSE_NODE_ID=${CLAWSYNAPSE_NODE_ID}
      - CLAWSYNAPSE_NODE_KEY=${CLAWSYNAPSE_NODE_KEY}
      - CLAWSYNAPSE_AGENT_ROLE=${CLAWSYNAPSE_AGENT_ROLE}
      - CLAWSYNAPSE_API_LISTEN=${CLAWSYNAPSE_API_LISTEN}
      - TOKENFLOW_API_KEY=${TOKENFLOW_API_KEY}
      - TOKENFLOW_BASE_URL=${TOKENFLOW_BASE_URL}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NOVITA_API_KEY=${NOVITA_API_KEY}
      - NOVITA_BASE_URL=${NOVITA_BASE_URL}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - HERMES_MODEL=${HERMES_MODEL}
      - HERMES_PROVIDER=${HERMES_PROVIDER}
      - HERMES_BASE_URL=${HERMES_BASE_URL}
      - HERMES_CUSTOM_PROVIDER_NAME=${HERMES_CUSTOM_PROVIDER_NAME}
      - HERMES_CUSTOM_PROVIDER_BASE_URL=${HERMES_CUSTOM_PROVIDER_BASE_URL}
      - HERMES_CUSTOM_PROVIDER_API_KEY=${HERMES_CUSTOM_PROVIDER_API_KEY}
      - HERMES_CUSTOM_PROVIDER_MODEL=${HERMES_CUSTOM_PROVIDER_MODEL}
      - HERMES_GATEWAY_KEY=${HERMES_GATEWAY_KEY}

    # ── Volumes（独立卷，身份/配置互不干扰）──
    volumes:
      - clawsynapse2-data:/root/.clawsynapse
      - hermes2-data:/root/.hermes

    # ── Logging ──
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  clawsynapse2-data:
    driver: local
  hermes2-data:
    driver: local
