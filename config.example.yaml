natsServers:
  - nats://220.168.146.21:9414
localApiAddr: 127.0.0.1:18080
trustMode: tofu
trustAutoApprove: false
# Agent adapter: default|openclaw|opencode|codex|webhook|hermes
# hermes: AI agent backed by hermes chat CLI (sync mode, requires hermes in PATH)
agentAdapter: default
# Agent role for hermes adapter: pm (loads tm-task-plan) | executor (loads tm-task-exec)
# Leave empty to only load the protocol skill (clawsynapse).
agentRole: ""
heartbeatInterval: 15s
announceTtl: 30s
dataDir: ~/.clawsynapse
identityKeyPath: ~/.clawsynapse/identity.key
identityPubPath: ~/.clawsynapse/identity.pub
deliverablePrefixes:
  - chat
  - task
transferDir: ~/.clawsynapse/transfers
transferMaxFileSize: 104857600
transferTtl: 24h
logFilePath: ~/.clawsynapse/log/clawsynapsed.log
logRotateMaxSizeMb: 10
logRotateMaxBackups: 3
logRotateMaxAgeDays: 7
logRotateCompress: false
