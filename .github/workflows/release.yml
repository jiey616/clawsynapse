name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build release artifacts
        run: make release-prep VERSION=${GITHUB_REF_NAME}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(gITHUB_REF_NAME, '-') }}
          body_path: dist/release-notes-${{ github.ref_name }}.md
          files: |
            dist/checksums.txt
            dist/clawsynapse-darwin-amd64
            dist/clawsynapse-darwin-arm64
            dist/clawsynapse-linux-amd64
            dist/clawsynapse-linux-arm64
            dist/clawsynapse-windows-amd64.exe
            dist/clawsynapse-windows-arm64.exe
            dist/clawsynapsed-darwin-amd64
            dist/clawsynapsed-darwin-arm64
            dist/clawsynapsed-linux-amd64
            dist/clawsynapsed-linux-arm64
            dist/clawsynapsed-windows-amd64.exe
            dist/clawsynapsed-windows-arm64.exe

  docker:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        if: ${{ secrets.ALIYUN_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Extract version (strip v prefix)
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Compute image tags
        id: tags
        run: |
          TAGS="ghcr.io/${{ github.repository }}:latest"
          TAGS="$TAGS,ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}"
          if [ -n "${{ secrets.ALIYUN_USERNAME }}" ]; then
            TAGS="$TAGS,${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/clawsynapse:latest"
            TAGS="$TAGS,${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/clawsynapse:${{ steps.version.outputs.VERSION }}"
          fi
          echo "TAGS=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.TAGS }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
