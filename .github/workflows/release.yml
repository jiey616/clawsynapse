name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

# Serialize release runs so overlapping tag pushes don't hit Tencent TCR's
# concurrent-login throttling. Queue (don't cancel) so an in-progress build
# finishes before the next one logs in.
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build release artifacts
        run: make release-prep VERSION=${GITHUB_REF_NAME}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: dist/release-notes-${{ github.ref_name }}.md
          files: |
            dist/checksums.txt
            dist/clawsynapse-darwin-amd64
            dist/clawsynapse-darwin-arm64
            dist/clawsynapse-linux-amd64
            dist/clawsynapse-linux-arm64
            dist/clawsynapse-windows-amd64.exe
            dist/clawsynapse-windows-arm64.exe
            dist/clawsynapsed-darwin-amd64
            dist/clawsynapsed-darwin-arm64
            dist/clawsynapsed-linux-amd64
            dist/clawsynapsed-linux-arm64
            dist/clawsynapsed-windows-amd64.exe
            dist/clawsynapsed-windows-arm64.exe

  docker:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Check which registries are configured ──
      - name: Check registry secrets
        id: check
        run: |
          if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "has_ghcr=true" >> $GITHUB_OUTPUT
          else
            echo "has_ghcr=false" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ secrets.TCR_USERNAME }}" ]; then
            echo "has_tcr=true" >> $GITHUB_OUTPUT
          else
            echo "has_tcr=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract version (strip v prefix)
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── Tencent TCR push (primary, China-friendly) ──
      # continue-on-error so a TCR login failure (e.g. personal-edition
      # concurrent-login throttling) does NOT short-circuit the GHCR path.
      - name: Log in to Tencent TCR
        if: steps.check.outputs.has_tcr == 'true'
        id: tcr_login
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Validate TCR config
        if: steps.check.outputs.has_tcr == 'true' && steps.tcr_login.outcome == 'success'
        id: tcr
        run: |
          TCR_REGISTRY=$(printf '%s' "${{ secrets.TCR_REGISTRY }}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          TCR_NAMESPACE=$(printf '%s' "${{ secrets.TCR_NAMESPACE }}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')

          echo "TCR registry: [${TCR_REGISTRY}]"
          echo "TCR namespace: [${TCR_NAMESPACE}]"

          if [ -z "$TCR_REGISTRY" ] || [ -z "$TCR_NAMESPACE" ]; then
            echo "::error::TCR_REGISTRY and TCR_NAMESPACE must be set"
            exit 1
          fi

          if [[ ! "$TCR_REGISTRY" =~ ^[a-zA-Z0-9][a-zA-Z0-9.-]*\.[a-zA-Z]{2,}$ ]]; then
            echo "::error::Invalid TCR_REGISTRY format: [$TCR_REGISTRY]"
            exit 1
          fi

          TCR_IMAGE="${TCR_REGISTRY}/${TCR_NAMESPACE}/clawsynapse"
          echo "IMAGE=$TCR_IMAGE" >> $GITHUB_OUTPUT
          echo "TCR image: ${TCR_IMAGE}"

      - name: Build and push to Tencent TCR
        if: steps.check.outputs.has_tcr == 'true' && steps.tcr_login.outcome == 'success'
        id: tcr_push
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.tcr.outputs.IMAGE }}:latest
            ${{ steps.tcr.outputs.IMAGE }}:${{ steps.version.outputs.VERSION }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report TCR push failure
        if: steps.check.outputs.has_tcr == 'true' && (steps.tcr_login.outcome == 'failure' || steps.tcr_push.outcome == 'failure')
        run: |
          echo "::warning::Tencent TCR login/push failed (login=${{ steps.tcr_login.outcome }}, push=${{ steps.tcr_push.outcome }}), but continuing to ghcr.io step"

      # ── GHCR push (optional, only if GHCR_TOKEN PAT is set) ──
      # continue-on-error so a GHCR login failure does NOT short-circuit the job
      # when TCR already succeeded.
      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.has_ghcr == 'true'
        id: ghcr_login
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push to GHCR
        if: steps.check.outputs.has_ghcr == 'true' && steps.ghcr_login.outcome == 'success'
        id: ghcr_push
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report GHCR push failure
        if: steps.check.outputs.has_ghcr == 'true' && (steps.ghcr_login.outcome == 'failure' || steps.ghcr_push.outcome == 'failure')
        run: |
          echo "::warning::GHCR login/push failed (login=${{ steps.ghcr_login.outcome }}, push=${{ steps.ghcr_push.outcome }}) — check that GHCR_TOKEN PAT has write:packages scope"

      # ── Fail the job only if ALL configured registries failed ──
      - name: Check overall result
        if: always()
        run: |
          TCR_OK="${{ steps.check.outputs.has_tcr == 'true' && steps.tcr_push.outcome == 'success' }}"
          GHCR_OK="${{ steps.check.outputs.has_ghcr == 'true' && steps.ghcr_push.outcome == 'success' }}"
          HAS_TCR="${{ steps.check.outputs.has_tcr }}"
          HAS_GHCR="${{ steps.check.outputs.has_ghcr }}"

          echo "TCR configured: $HAS_TCR, login: ${{ steps.tcr_login.outcome }}, push: ${{ steps.tcr_push.outcome }}"
          echo "GHCR configured: $HAS_GHCR, login: ${{ steps.ghcr_login.outcome }}, push: ${{ steps.ghcr_push.outcome }}"

          if [ "$HAS_TCR" != "true" ] && [ "$HAS_GHCR" != "true" ]; then
            echo "::error::No registry secrets configured (TCR_USERNAME or GHCR_TOKEN)"
            exit 1
          fi

          if [ "$TCR_OK" != "true" ] && [ "$GHCR_OK" != "true" ]; then
            echo "::error::All configured registry pushes failed"
            exit 1
          fi

          echo "At least one registry push succeeded"
