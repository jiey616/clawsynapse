name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build release artifacts
        run: make release-prep VERSION=${GITHUB_REF_NAME}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: dist/release-notes-${{ github.ref_name }}.md
          files: |
            dist/checksums.txt
            dist/clawsynapse-darwin-amd64
            dist/clawsynapse-darwin-arm64
            dist/clawsynapse-linux-amd64
            dist/clawsynapse-linux-arm64
            dist/clawsynapse-windows-amd64.exe
            dist/clawsynapse-windows-arm64.exe
            dist/clawsynapsed-darwin-amd64
            dist/clawsynapsed-darwin-arm64
            dist/clawsynapsed-linux-amd64
            dist/clawsynapsed-linux-arm64
            dist/clawsynapsed-windows-amd64.exe
            dist/clawsynapsed-windows-arm64.exe

  docker:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Check which registries are configured ──
      - name: Check registry secrets
        id: check
        run: |
          if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "has_ghcr=true" >> $GITHUB_OUTPUT
          else
            echo "has_ghcr=false" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ secrets.ALIYUN_ACR_USERNAME }}" ]; then
            echo "has_aliyun=true" >> $GITHUB_OUTPUT
          else
            echo "has_aliyun=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract version (strip v prefix)
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── Aliyun ACR push (primary, China-friendly) ──
      - name: Log in to Aliyun ACR
        if: steps.check.outputs.has_aliyun == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Validate Aliyun ACR config
        if: steps.check.outputs.has_aliyun == 'true'
        id: aliyun
        run: |
          ALIYUN_REGISTRY=$(printf '%s' "${{ secrets.ALIYUN_ACR_REGISTRY }}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          ALIYUN_NAMESPACE=$(printf '%s' "${{ secrets.ALIYUN_ACR_NAMESPACE }}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')

          echo "Aliyun registry: [${ALIYUN_REGISTRY}]"
          echo "Aliyun namespace: [${ALIYUN_NAMESPACE}]"

          if [ -z "$ALIYUN_REGISTRY" ] || [ -z "$ALIYUN_NAMESPACE" ]; then
            echo "::error::ALIYUN_ACR_REGISTRY and ALIYUN_ACR_NAMESPACE must be set"
            exit 1
          fi

          if [[ ! "$ALIYUN_REGISTRY" =~ ^[a-zA-Z0-9][a-zA-Z0-9.-]*\.[a-zA-Z]{2,}$ ]]; then
            echo "::error::Invalid ALIYUN_ACR_REGISTRY format: [$ALIYUN_REGISTRY]"
            exit 1
          fi

          ALIYUN_IMAGE="${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/clawsynapse"
          echo "IMAGE=$ALIYUN_IMAGE" >> $GITHUB_OUTPUT
          echo "Aliyun image: ${ALIYUN_IMAGE}"

      - name: Build and push to Aliyun ACR
        if: steps.check.outputs.has_aliyun == 'true'
        id: aliyun_push
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.aliyun.outputs.IMAGE }}:latest
            ${{ steps.aliyun.outputs.IMAGE }}:${{ steps.version.outputs.VERSION }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}

      - name: Report Aliyun push failure
        if: steps.check.outputs.has_aliyun == 'true' && steps.aliyun_push.outcome == 'failure'
        run: |
          echo "::warning::Aliyun ACR push failed, but continuing to ghcr.io step"

      # ── GHCR push (optional, only if GHCR_TOKEN PAT is set) ──
      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.has_ghcr == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push to GHCR
        if: steps.check.outputs.has_ghcr == 'true'
        id: ghcr_push
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}

      - name: Report GHCR push failure
        if: steps.check.outputs.has_ghcr == 'true' && steps.ghcr_push.outcome == 'failure'
        run: |
          echo "::warning::GHCR push failed — check that GHCR_TOKEN PAT has write:packages scope"

      # ── Fail the job only if BOTH registries failed (or neither was configured) ──
      - name: Check overall result
        if: always
        run: |
          ALIYUN_OK="${{ steps.check.outputs.has_aliyun == 'true' && steps.aliyun_push.outcome == 'success' }}"
          GHCR_OK="${{ steps.check.outputs.has_ghcr == 'true' && steps.ghcr_push.outcome == 'success' }}"
          HAS_ALIYUN="${{ steps.check.outputs.has_aliyun }}"
          HAS_GHCR="${{ steps.check.outputs.has_ghcr }}"

          echo "Aliyun configured: $HAS_ALIYUN, push result: ${{ steps.aliyun_push.outcome }}"
          echo "GHCR configured: $HAS_GHCR, push result: ${{ steps.ghcr_push.outcome }}"

          if [ "$HAS_ALIYUN" != "true" ] && [ "$HAS_GHCR" != "true" ]; then
            echo "::error::No registry secrets configured (ALIYUN_ACR_USERNAME or GHCR_TOKEN)"
            exit 1
          fi

          if [ "$ALIYUN_OK" != "true" ] && [ "$GHCR_OK" != "true" ]; then
            echo "::error::All configured registry pushes failed"
            exit 1
          fi

          echo "At least one registry push succeeded"
