# docker-compose.yml — ClawSynapse + Hermes Agent
# 同一个容器运行 clawsynapsed + hermes CLI
#
# 使用方式:
#   1. cp .env.example .env && vim .env     # 填写 API Key
#   2. docker compose build                   # 构建镜像
#   3. docker compose up -d                   # 启动
#   4. docker compose logs -f                 # 查看日志
#   5. docker compose down                    # 停止
# ────────────────────────────────────────────

services:
  clawsynapse:
    build:
      context: .
      dockerfile: Dockerfile
    image: clawsynapse:latest
    container_name: clawsynapse
    hostname: clawsynapse
    restart: unless-stopped

    # ── Ports ──
    ports:
      - "${CLAWSYNAPSE_API_PORT:-8080}:8080"

    # ── Environment variables ──
    environment:
      # ClawSynapse identity (init 时使用，留空则自动生成)
      - CLAWSYNAPSE_NODE_ID=${CLAWSYNAPSE_NODE_ID:-}
      - CLAWSYNAPSE_NODE_KEY=${CLAWSYNAPSE_NODE_KEY:-}
      - CLAWSYNAPSE_AGENT_ROLE=${CLAWSYNAPSE_AGENT_ROLE:-pm}
      - CLAWSYNAPSE_API_LISTEN=${CLAWSYNAPSE_API_LISTEN:-0.0.0.0:8080}

      # Hermes LLM provider (entrypoint 写入 ~/.hermes/.env)
      # TokenFlow — 默认 provider (OpenAI 兼容)
      - TOKENFLOW_API_KEY=${TOKENFLOW_API_KEY:-}
      - TOKENFLOW_BASE_URL=${TOKENFLOW_BASE_URL:-http://36.137.106.15:3030/v1}
      # 其他 provider (可选)
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - NOVITA_API_KEY=${NOVITA_API_KEY:-}
      - NOVITA_BASE_URL=${NOVITA_BASE_URL:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}

      # Hermes 模型配置 (entrypoint 写入 ~/.hermes/config.yaml)
      - HERMES_MODEL=${HERMES_MODEL:-}
      - HERMES_PROVIDER=${HERMES_PROVIDER:-openai}
      - HERMES_BASE_URL=${HERMES_BASE_URL:-http://36.137.106.15:3030/v1}

    # ── Volumes (data persistence across restarts) ──
    volumes:
      # ClawSynapse: config, identity, store
      - clawsynapse-data:/root/.clawsynapse
      # Hermes: config, .env, skills, history, auth
      - hermes-data:/root/.hermes

    # ── Logging ──
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  clawsynapse-data:
    driver: local
  hermes-data:
    driver: local
